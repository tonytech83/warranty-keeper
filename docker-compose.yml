services:
  web:
    build: .
    container_name: warranty_keeper
    ports:
      - "8000:8000"
    environment:
      # Values are read from a local .env file if present (see .env.example).
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-me-in-production}
      - DEBUG=${DEBUG:-False}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,[::1]}
      - CURRENCY=${CURRENCY:-€}
      - SQLITE_PATH=/app/data/db.sqlite3
      - MEDIA_ROOT=/app/mediafiles
      # Disable SQLite file locking so the DB works on SMB/CIFS/NFS shares,
      # which don't support POSIX locks. Safe with a single Gunicorn worker.
      # Set to 0 if the DB lives on a normal local filesystem.
      - SQLITE_NOLOCK=${SQLITE_NOLOCK:-1}
    volumes:
      # Bind mounts to real host folders (easy backup). Override the host paths
      # with DATA_DIR / MEDIA_DIR in .env to point at a NAS/share, e.g.
      #   DATA_DIR=/mnt/omv-smb-share/docker-volumes/warranty-keeper/data
      #   MEDIA_DIR=/mnt/omv-smb-share/docker-volumes/warranty-keeper/media
      #
      # IMPORTANT — network shares (SMB/CIFS, NFS): SQLite needs POSIX
      # byte-range locks. CIFS rejects them, causing "database is locked".
      # Mount the share with byte-range locking disabled — for CIFS add `nobrl`
      # to the mount options (see README "Storing the DB on a NAS / SMB share").
      - ${DATA_DIR:-./data}:/app/data
      - ${MEDIA_DIR:-./mediafiles}:/app/mediafiles
    restart: unless-stopped
